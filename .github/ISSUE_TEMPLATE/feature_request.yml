name: ✨ Feature request
description: Suggest a new view, adapter, integration, or enhancement.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Agent Show's scope is intentionally narrow: **read-only, local-only inspection of CLI agent sessions**.
        Requests that fit that scope (new adapters, better views, richer analytics) are very welcome.
        Requests that change session files, send data off-device, or require a server component are usually out of scope.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case before the feature. "When I do X, I currently can't Y, which makes Z hard."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the feature look like? UI sketch, CLI flag, new tab, new adapter — anything concrete helps.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - New adapter (a CLI agent we don't support yet)
        - Existing adapter (Claude / Copilot / Codex)
        - Web dashboard / UI
        - Insights / analytics
        - Conversation flow view
        - Tool inspector
        - CLI / serve binary
        - Install / packaging
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing tools / workarounds you've tried and why they fall short.

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
